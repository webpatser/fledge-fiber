name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fledge_test
          MYSQL_USER: fledge
          MYSQL_PASSWORD: fledge
        ports:
          - 13306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fledge_test
          POSTGRES_USER: fledge
          POSTGRES_PASSWORD: fledge
        ports:
          - 15432:5432
        options: >-
          --health-cmd="pg_isready -U fledge"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:8-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      httpbin:
        image: kennethreitz/httpbin
        ports:
          - 18080:80

      websocket:
        image: jmalloc/echo-server
        ports:
          - 18081:8080
        env:
          PORT: 8080

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, pdo_pgsql, sockets, pcntl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/pest --no-coverage
        env:
          FLEDGE_TEST_MYSQL_HOST: 127.0.0.1
          FLEDGE_TEST_MYSQL_PORT: 13306
          FLEDGE_TEST_MYSQL_USER: fledge
          FLEDGE_TEST_MYSQL_PASSWORD: fledge
          FLEDGE_TEST_MYSQL_DATABASE: fledge_test
          FLEDGE_TEST_POSTGRES_HOST: 127.0.0.1
          FLEDGE_TEST_POSTGRES_PORT: 15432
          FLEDGE_TEST_POSTGRES_USER: fledge
          FLEDGE_TEST_POSTGRES_PASSWORD: fledge
          FLEDGE_TEST_POSTGRES_DATABASE: fledge_test
          FLEDGE_TEST_REDIS_HOST: 127.0.0.1
          FLEDGE_TEST_REDIS_PORT: 16379
          FLEDGE_TEST_HTTPBIN_URL: http://127.0.0.1:18080
          FLEDGE_TEST_WEBSOCKET_URL: ws://127.0.0.1:18081
