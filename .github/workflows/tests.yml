name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fledge_test
          MYSQL_USER: fledge
          MYSQL_PASSWORD: fledge
        ports:
          - 13306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fledge_test
          POSTGRES_USER: fledge
          POSTGRES_PASSWORD: fledge
        ports:
          - 15432:5432
        options: >-
          --health-cmd="pg_isready -U fledge"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:8-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      httpbin:
        image: kennethreitz/httpbin
        ports:
          - 18080:80

      websocket:
        image: jmalloc/echo-server
        ports:
          - 18081:8080
        env:
          PORT: 8080

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, pdo_pgsql, sockets, pcntl, ffi
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start Redis cluster
        run: |
          docker run -d --name redis-cluster \
            -e IP=0.0.0.0 -e INITIAL_PORT=17000 -e MASTERS=3 -e SLAVES_PER_MASTER=1 \
            -p 17000-17005:17000-17005 -p 27000-27005:27000-27005 \
            grokzen/redis-cluster:7.0.10
          timeout 90 sh -c 'until docker exec redis-cluster redis-cli -p 17000 cluster info 2>/dev/null | grep -q "cluster_state:ok"; do sleep 2; done'

      - name: Run tests
        run: vendor/bin/pest --no-coverage
        env:
          FLEDGE_TEST_MYSQL_HOST: 127.0.0.1
          FLEDGE_TEST_MYSQL_PORT: 13306
          FLEDGE_TEST_MYSQL_USER: fledge
          FLEDGE_TEST_MYSQL_PASSWORD: fledge
          FLEDGE_TEST_MYSQL_DATABASE: fledge_test
          FLEDGE_TEST_POSTGRES_HOST: 127.0.0.1
          FLEDGE_TEST_POSTGRES_PORT: 15432
          FLEDGE_TEST_POSTGRES_USER: fledge
          FLEDGE_TEST_POSTGRES_PASSWORD: fledge
          FLEDGE_TEST_POSTGRES_DATABASE: fledge_test
          FLEDGE_TEST_REDIS_HOST: 127.0.0.1
          FLEDGE_TEST_REDIS_PORT: 16379
          FLEDGE_TEST_REDIS_CLUSTER_NODES: 127.0.0.1:17000,127.0.0.1:17001,127.0.0.1:17002
          FLEDGE_TEST_HTTPBIN_URL: http://127.0.0.1:18080
          FLEDGE_TEST_WEBSOCKET_URL: ws://127.0.0.1:18081
