services:
  mysql:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fledge_test
      MYSQL_USER: fledge
      MYSQL_PASSWORD: fledge
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: fledge_test
      POSTGRES_USER: fledge
      POSTGRES_PASSWORD: fledge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fledge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  httpbin:
    image: kennethreitz/httpbin
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/get"]
      interval: 5s
      timeout: 5s
      retries: 10

  websocket:
    image: jmalloc/echo-server
    ports:
      - "18081:8080"
    environment:
      PORT: 8080
